<text x="340" y="122" text-anchor="middle" transform="rotate(-2 340 105)" style="font-size:46px; font-weight:500;;fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:46px;font-weight:500;text-anchor:middle;dominant-baseline:auto">
